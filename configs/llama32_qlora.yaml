model:
  name: unsloth/Llama-3.2-3B-Instruct
  max_seq_length: 2048
  load_in_4bit: true
  dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: data/processed/train.jsonl
  val_path: data/processed/val.jsonl

training:
  output_dir: models/checkpoints
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  optim: adamw_8bit
  weight_decay: 0.0
  bf16: true
  fp16: false
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  seed: 42
  report_to: wandb
  run_name: llama32-3b-qlora-cuad

wandb:
  project: legal-llm
  entity: null  # set to your W&B username/team
